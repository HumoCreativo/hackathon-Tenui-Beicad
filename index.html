        const handleWithdrawSubmit = (amount) => {
          setSmartAccount((prev) => ({
            ...prev,

        return (
          <div className="min-h-screen bg-slate-950 text-slate-100 bg-grid-pattern flex flex-col justify-between">

                <HeroAssetCard t={t} />

                {/* 50% Left Column Financial Hub (Tenui Gateway + Carbon Wallet), 50% Right Column Dual Dynamic Yield Simulator */}
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
